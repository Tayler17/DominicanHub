version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dh_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: dominican_hub
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: dominican_hub_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dominican_hub']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dh_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: dh_api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://dominican_hub:secret@postgres:5432/dominican_hub_dev
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    env_file:
      - .env
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: dh_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    env_file:
      - .env
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: npm run dev

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: dh_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://dominican_hub:secret@postgres:5432/dominican_hub_dev
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    env_file:
      - .env
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:worker

  adminer:
    image: adminer:latest
    container_name: dh_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
